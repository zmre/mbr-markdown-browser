name: CI
permissions:
  contents: read

on:
  push:
    branches: [main] # Only run on direct pushes to main
    tags-ignore: ["v*"] # Don't run CI on release tags (release workflow handles that)
  pull_request:
    branches: [main] # Run on all PRs targeting main

# Cancel in-progress runs when a new run starts for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Fast check - runs first, fails fast on formatting issues
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Check formatting
        run: nix develop --command cargo fmt -- --check

  # Build frontend components - needed by lint and test jobs
  build-components:
    name: Build Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zmre
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build components
        run: |
          set -euo pipefail
          nix build -L .#mbr-components
          echo "=== Nix build output ==="
          ls -la result/
          mkdir -p templates/components-js
          cp -v result/* templates/components-js/
          echo "=== Copied components ==="
          ls -la templates/components-js/
          test -f templates/components-js/mbr-components.min.js || { echo "FATAL: mbr-components.min.js not created!"; exit 1; }
          test -f templates/components-js/mbr-editor.min.js || { echo "FATAL: mbr-editor.min.js not created!"; exit 1; }
          test -f templates/components-js/mbr-graph.min.js || { echo "FATAL: mbr-graph.min.js not created!"; exit 1; }
          test -f templates/components-js/mbr-genealogy.min.js || { echo "FATAL: mbr-genealogy.min.js not created!"; exit 1; }

      - name: Upload components
        uses: actions/upload-artifact@v7
        with:
          name: components
          path: templates/components-js/
          retention-days: 1
          if-no-files-found: error

  # Clippy lint - runs after components are built
  lint:
    name: Clippy Lint (${{ matrix.os }})
    needs: [format-check, build-components]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download components
        uses: actions/download-artifact@v8
        with:
          name: components
          path: templates/components-js/

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zmre
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Clippy lint
        run: nix build -L .#clippy

  # Tests - runs after components are built
  test:
    name: Test (${{ matrix.os }})
    needs: [format-check, build-components]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download components
        uses: actions/download-artifact@v8
        with:
          name: components
          path: templates/components-js/

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zmre
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Run tests
        run: nix build -L .#tests

  # Full build - runs in parallel with lint/test
  build:
    name: Build (${{ matrix.os }})
    needs: [format-check, build-components]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download components
        uses: actions/download-artifact@v8
        with:
          name: components
          path: templates/components-js/

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zmre
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build
        run: nix build -L .#mbr

      - name: Check docs for broken links
        run: ./result/bin/mbr -b docs --fail-on-broken-links

  # Swift checks - only run on macOS
  swift-check:
    name: Swift Checks
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zmre
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Swift format check
        run: nix build -L .#swiftfmt

      - name: SwiftLint check
        run: nix build -L .#swiftlint-check

  # Guard against Dependabot (or manual) bumps of components/ dependencies that
  # forget to regenerate components/package-lock.json and the flake's npmDepsHash.
  # The Nix component build (`nix build .#mbr-components`) reads package-lock.json
  # and pins its contents via npmDepsHash, so a bump of components/package.json (or
  # the bun lockfile) that leaves those untouched will break the build on merge.
  # This job regenerates both from package.json and FAILS if they drift.
  components-lock-sync:
    name: Components Lockfile & npmDepsHash Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect components/ changes
        id: changes
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          # Only relevant on pull_request events; skip on pushes to main.
          if [ -z "$base" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" HEAD | grep -qE '^components/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.changes.outputs.changed == 'true'
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Verify package-lock.json and npmDepsHash are in sync
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Regenerate components/package-lock.json and flake.nix's npmDepsHash
          # from components/package.json. `npm` comes from the pinned nodejs;
          # sync-npm-deps.sh internally uses `nix run nixpkgs#prefetch-npm-deps`.
          nix shell nixpkgs#nodejs --command scripts/sync-npm-deps.sh --force
          if ! git diff --quiet -- components/package-lock.json flake.nix; then
            echo "::error::components/package-lock.json and/or flake.nix npmDepsHash are out of sync with components/package.json."
            echo "Run 'scripts/sync-npm-deps.sh --force' locally, then commit the updated components/package-lock.json and flake.nix."
            git --no-pager diff -- components/package-lock.json flake.nix
            exit 1
          fi
          echo "Components package-lock.json and npmDepsHash are in sync."

  # Frontend component tests (TypeScript)
  test-components:
    name: Test Frontend Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd components && bun install

      - name: Run component tests
        run: cd components && bun run test

      - name: Build components (includes type check via tsc)
        run: cd components && bun run build
